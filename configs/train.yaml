# GNN Training Configuration
# ==========================

# Training case: "logical_head", "mwpm_teacher", "hybrid", or "tn_teacher"
case: "logical_head"

# Compute backend: "pytorch", "compiled", or "cuda"
backend: "pytorch"
compile_mode: "reduce-overhead"

# Data paths
datasets_dir: "./data/datasets"
output_dir: "./outputs/runs"

# Model architecture
model:
  hidden_dim: 128
  num_layers: 8
  dropout: 0.1

# Optimisation
optimisation:
  lr: 1.0e-4
  weight_decay: 1.0e-5
  epochs: 500
  batch_size: 256

# Data loading
num_workers: 4

# Sample cap for fast iteration (null = use all data)
max_samples: null

# Edge-case specific (mwpm_teacher / hybrid; ignored for tn_teacher).
# Set to null to auto-estimate from training data.
edge_pos_weight: null

# Gradient clipping
max_grad_norm: 1.0

# Early stopping: patience counts validation runs, not epochs.
# With val_every: 5 and patience: 25, the model must improve within 125 epochs.
# Set patience to 0 to disable early stopping.
patience: 0
val_every: 1

# Reproducibility
seed: 42
