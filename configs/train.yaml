# GNN Training Configuration
# ==========================

# Training case: "direct" or "edge"
case: "direct"

# Compute backend: "pytorch" or "compiled" for training.
# "cuda" is inference-only (custom kernels lack autograd backward).
backend: "pytorch"

# torch.compile mode (only used when backend is "compiled").
# "default" - Triton kernel fusion, safe with dynamic GNN shapes.
# "reduce-overhead" - adds CUDA graphs but causes recompilation on
#   every new batch shape (GNN batches have variable N/E) => avoid.
compile_mode: "default"

# Data paths
datasets_dir: "./data/datasets"
output_dir: "./outputs/runs"

# Model architecture
model:
  hidden_dim: 128
  num_layers: 6
  dropout: 0.1

# Optimisation
optimisation:
  lr: 1.5e-4
  weight_decay: 1.0e-5
  epochs: 750
  batch_size: 128

# Data loading
num_workers: 4

# Sample cap for fast iteration (null = use all data)
max_samples: null

# Gradient clipping
max_grad_norm: 1.0

# Early stopping: patience counts validation runs, not epochs.
# With val_every: 5 and patience: 75, the model must improve within 375 epochs.
# Set patience to 0 to disable early stopping.
patience: 75
val_every: 5

# Reproducibility
seed: 42
